<!doctype html>
<html>
<head>
<style>
body {
  background-color: black;
  color: cyan;
  font-family: monospace;
}

.text {
  font-size: 10vw;
}

.vertical-center {
  margin: 0;
  position: absolute;
  top: 50%;
  -ms-transform: translateY(-50%);
  transform: translateY(-50%);
}

/* unvisited link */
a:link {
  color: cyan;
}

/* visited link */
a:visited {
  color: cyan;
}

/* mouse over link */
a:hover {
  color: blue;
}

/* selected link */
a:active {
  color: blue;
}
</style>
</head>

<body>
<center>
<div class="text">
. : <a onclick="history.back()">back</a> : .<br>
403
</div>
</center>
</body>
</html>
